<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin & Win</title>

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at center, rgba(255,122,0,0.2), transparent 60%),
linear-gradient(135deg,#0c0f14,#1a1f2b);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

/* HEADING */
.heading{
display:flex;
align-items:center;
gap:10px;
font-size:26px;
font-weight:600;
margin-bottom:10px;
}

.heading img{
width:36px;
height:36px;
}

/* WHEEL */
#wheel-container{
position:relative;
width:90vw;
max-width:420px;
height:90vw;
max-height:420px;
margin-top:10px;
margin-bottom:10px;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:12px solid #ff7a00;

box-shadow:
0 10px 25px rgba(0,0,0,0.7),
inset 0 6px 12px rgba(255,255,255,0.15),
inset 0 -10px 20px rgba(0,0,0,0.6);

transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
}

#wheel.dimmed{
filter:brightness(0.4);
}

/* POINTER */
#pointer{
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:30px solid #ff7a00;
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
filter:drop-shadow(0 4px 6px rgba(0,0,0,0.6))
       drop-shadow(0 0 8px rgba(255,122,0,0.6));
}

#pointer.tick{
animation: tick 0.12s linear infinite;
}

#pointer.bounce{
animation: bounce 0.5s ease;
}

@keyframes tick{
0%{transform:translateX(-50%) rotate(0deg);}
50%{transform:translateX(-50%) rotate(-12deg);}
100%{transform:translateX(-50%) rotate(0deg);}
}

@keyframes bounce{
0%{transform:translateX(-50%) rotate(0deg);}
50%{transform:translateX(-50%) rotate(-15deg);}
100%{transform:translateX(-50%) rotate(0deg);}
}

/* CENTER IMAGE */
#center-img{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
box-shadow:0 0 20px rgba(255,122,0,0.5);
}

#center-img img{
width:100%;
height:100%;
object-fit:cover;
}

/* BUTTON */
button{
padding:14px 24px;
margin-top:35px;
background:linear-gradient(135deg,#ff7a00,#ff9f43);
border:none;
color:white;
font-size:16px;
border-radius:30px;
cursor:pointer;
font-weight:600;
box-shadow:0 6px 20px rgba(255,122,0,0.3);
}

/* POPUP */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:#11151c;
padding:30px;
border-radius:15px;
text-align:center;
width:85%;
max-width:360px;
}

.popup-content h2{
font-size:28px;
color:#ff7a00;
}

.coupon{
font-size:22px;
color:#ffd700;
font-weight:bold;
margin:10px 0;
}

/* BUTTONS */
.action-btn{
display:block;
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:25px;
font-size:15px;
cursor:pointer;
}

.insta{
background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af);
color:white;
}

.whatsapp{
background:linear-gradient(135deg,#25D366,#128C7E);
color:white;
}

/* CONFETTI */
.confetti{
position:fixed;
width:8px;
height:8px;
top:50%;
left:50%;
animation:burst 1s ease-out forwards;
}

@keyframes burst{
to{
transform:translate(var(--x), var(--y)) rotate(720deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="heading">
<img src="logo.png">
<span>Spin & Win</span>
</div>

<div id="wheel-container">
<div id="pointer"></div>
<canvas id="wheel" width="400" height="400"></canvas>

<div id="center-img">
<img src="ghumakkad.png">
</div>
</div>

<button onclick="spin()">Spin Now</button>

<div id="popup">
<div class="popup-content">

<h2 id="resultText"></h2>

<p style="opacity:0.7;">Your Coupon Code</p>
<p class="coupon" id="couponCode"></p>

<p>1. Follow on Instagram</p>
<button class="action-btn insta"
onclick="window.open('https://instagram.com/adventuresaathi')">
Follow Instagram
</button>

<p>2. Claim on WhatsApp</p>
<button id="waBtn" class="action-btn whatsapp">
Claim on WhatsApp
</button>

</div>
</div>

<script>

const options=["₹100","₹200","₹300","₹400","₹500","₹1000","Better Luck Next Time"];

const colors=[
"#ff7a00",
"#ff3d00",
"#ffb300",
"#ff6f61",
"#9c27b0",
"#00c853",
"#444"
];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const arc=(2*Math.PI)/options.length;

function drawWheel(highlightIndex=-1,flash=false){
ctx.clearRect(0,0,400,400);

for(let i=0;i<options.length;i++){

ctx.beginPath();

let gradient = ctx.createRadialGradient(200,200,60,200,200,200);

if(i===highlightIndex && flash){
gradient.addColorStop(0,"#fff4b0");
gradient.addColorStop(1,"#ffd700");
}else{
gradient.addColorStop(0,colors[i]);
gradient.addColorStop(1,"#000");
}

ctx.fillStyle = gradient;

ctx.moveTo(200,200);
ctx.arc(200,200,200,arc*i,arc*(i+1));
ctx.fill();

ctx.strokeStyle="rgba(255,255,255,0.1)";
ctx.stroke();

ctx.save();
ctx.translate(200,200);
ctx.rotate(arc*i+arc/2);

ctx.fillStyle="white";
ctx.font="bold 14px Arial";
ctx.fillText(options[i],90,5);

ctx.restore();
}
}

drawWheel();

let spinning=false;
let rotation=0;

function generateCode(amount){
return "AS"+amount.replace("₹","")+"-"+Math.random().toString(36).substring(2,6).toUpperCase();
}

function spin(){

if(spinning) return;
spinning=true;

const pointer=document.getElementById("pointer");
pointer.classList.add("tick");

const weighted=[
"₹100","₹100",
"₹200","₹200",
"₹300",
"₹400",
"Better Luck Next Time"
];

const result=weighted[Math.floor(Math.random()*weighted.length)];
const index=options.indexOf(result);

const segmentAngle=360/options.length;
const targetAngle=(index*segmentAngle)+(segmentAngle/2);

const spinDeg=(360*5)+(360-targetAngle);
rotation+=spinDeg;

document.getElementById("wheel").style.transform=`rotate(${rotation}deg)`;

setTimeout(()=>{

pointer.classList.remove("tick");
pointer.classList.add("bounce");

setTimeout(()=>pointer.classList.remove("bounce"),500);

let coupon="";
if(result.includes("₹")){
coupon=generateCode(result);
burst();
}

document.getElementById("resultText").innerText=
result.includes("₹") ? "🎉 You Won "+result : "😔 Better Luck Next Time";

document.getElementById("couponCode").innerText=coupon;

document.getElementById("popup").style.display="flex";

document.getElementById("waBtn").onclick=()=>{
window.open(`https://wa.me/918808970991?text=I won ${result} coupon ${coupon}`);
};

spinning=false;

},4000);

}

function burst(){
for(let i=0;i<60;i++){
const d=document.createElement("div");
d.className="confetti";
d.style.background=`hsl(${Math.random()*360},100%,50%)`;
d.style.setProperty('--x',(Math.random()-0.5)*600+"px");
d.style.setProperty('--y',(Math.random()-0.5)*600+"px");
document.body.appendChild(d);
setTimeout(()=>d.remove(),1000);
}
}

</script>

</body>
</html>
