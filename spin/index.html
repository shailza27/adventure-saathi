<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spin & Win | Adventure Saathi</title>

<style>
body{
font-family:'Inter',sans-serif;
background:#0c0f14;
color:white;
text-align:center;
padding-top:40px;
}

/* WHEEL */
#wheel-container{
position:relative;
width:320px;
height:320px;
margin:40px auto;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:8px solid #ff7a00;
transition: transform 4s ease-out;
}

/* POINTER */
#pointer{
width:0;
height:0;
border-left:15px solid transparent;
border-right:15px solid transparent;
border-bottom:25px solid #ff7a00;
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
}

/* CENTER LOGO */
#center-logo{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0c0f14;
border-radius:50%;
padding:10px 15px;
font-size:12px;
border:2px solid #ff7a00;
}

/* BUTTON */
button{
padding:12px 20px;
background:#ff7a00;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

/* RESULT */
#result{
margin-top:20px;
font-size:18px;
color:#ff7a00;
}

/* CONFETTI */
.confetti{
position:fixed;
width:10px;
height:10px;
background:red;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}
</style>
</head>

<body>

<h1>🎡 Spin & Win</h1>
<p>Win discounts on your next adventure</p>

<div id="wheel-container">
<div id="pointer"></div>
<canvas id="wheel" width="320" height="320"></canvas>
<div id="center-logo">Adventure<br>Saathi</div>
</div>

<button onclick="spin()">Spin Now</button>

<div id="result"></div>

<!-- ACTION BUTTONS -->
<div id="actions" style="display:none;">
<a href="https://instagram.com/adventuresaathi" target="_blank">
<button>📸 Follow on Instagram</button>
</a>

<a id="whatsappBtn" target="_blank">
<button>📲 Claim on WhatsApp</button>
</a>
</div>

<script>

const options = [
"₹100","₹200","₹300","₹400","₹500","₹1000","Better Luck Next Time"
];

const colors = [
"#ff7a00","#ff3d00","#ffb300","#ff6f61","#ffa726","#ff5722","#555"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const arc = (2 * Math.PI) / options.length;

function drawWheel(){
for(let i=0;i<options.length;i++){

ctx.beginPath();
ctx.fillStyle = colors[i];
ctx.moveTo(160,160);
ctx.arc(160,160,160,arc*i,arc*(i+1));
ctx.fill();

ctx.save();
ctx.translate(160,160);
ctx.rotate(arc*i + arc/2);
ctx.fillStyle="white";
ctx.font="14px Arial";
ctx.fillText(options[i],80,5);
ctx.restore();

}
}

drawWheel();

let spinning=false;
let currentRotation=0;

function spin(){

if(localStorage.getItem("spun")){
alert("You already used your spin!");
return;
}

if(spinning) return;
spinning=true;

// weighted results
const weighted = [
"₹100","₹100",
"₹200","₹200",
"₹300",
"₹400",
"₹500",
"₹1000",
"Better Luck Next Time","Better Luck Next Time"
];

const result = weighted[Math.floor(Math.random()*weighted.length)];
const index = options.indexOf(result);

const spinDeg = 360*5 + (360 - index * (360/options.length));
currentRotation += spinDeg;

document.getElementById("wheel").style.transform =
`rotate(${currentRotation}deg)`;

setTimeout(()=>{

localStorage.setItem("spun", "true");

let coupon = "";
if(result.includes("₹")){
coupon = "AS" + result.replace("₹","");
}

document.getElementById("result").innerHTML = `
🎉 Result: ${result}
<br><br>
🎟️ Coupon: <b>${coupon || "N/A"}</b>
`;

if(result !== "Better Luck Next Time"){
launchConfetti();
}

document.getElementById("actions").style.display="block";

// WhatsApp message
const msg = encodeURIComponent(
`Hi Adventure Saathi! I just won ${result} (Coupon: ${coupon}) from Spin Wheel 🎡`
);

document.getElementById("whatsappBtn").href =
`https://wa.me/918808970991?text=${msg}`;

spinning=false;

},4000);

}

function launchConfetti(){
for(let i=0;i<50;i++){
const div = document.createElement("div");
div.className="confetti";
div.style.left=Math.random()*100+"vw";
div.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(div);

setTimeout(()=>div.remove(),3000);
}
}

</script>

</body>
</html>
