<script>

// ================= CONFIG =================

const CMS_API = "https://script.google.com/macros/s/AKfycbxGiwbYnBc0cSNzMKq0IG3uFioOUF5vw2J5St-WiTW8B4e5wfqFR8w8M1DbLBx-JLauXA/exec";
const LEADS_API = "https://script.google.com/macros/s/AKfycbwaAAPsyGDx60r8MvcQ_kzQnFa-VwXcpNnOaDXfLt3oLv6vje9vzFgLc7lGcQyWwPuP/exec";


// ================= LOAD TREKS =================

async function loadTreks() {
  const res = await fetch(CMS_API);
  const data = await res.json();

  const container = document.getElementById("trek-container");
  const dropdown = document.getElementById("destination");

  container.innerHTML = "";
  dropdown.innerHTML = '<option value="">Select Destination</option>';

  data
    .filter(trek => trek.status === "active")
    .forEach(trek => {

      container.innerHTML += `
        <div class="card">
          <h3>${trek.trek_name}</h3>
          <p><strong>Location:</strong> ${trek.location}</p>
          <p><strong>Price:</strong> ₹ ${trek.price}</p>
          <p><strong>Dates:</strong> ${trek.dates}</p>
          <p>${trek.description}</p>
          <button class="btn-primary" onclick="openModal('${trek.trek_name}')">
            Book Now
          </button>
        </div>
      `;

      dropdown.innerHTML += `
        <option value="${trek.trek_name}">
          ${trek.trek_name}
        </option>
      `;
    });
}

loadTreks();


// ================= BOOKING SUBMIT =================

document.getElementById("bookingForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData();
  formData.append("name", document.getElementById("name").value);
  formData.append("date", document.getElementById("date").value);
  formData.append("destination", document.getElementById("destination").value);
  formData.append("people", document.getElementById("people").value);

  fetch(LEADS_API, {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(data => {
    alert("Booking Submitted Successfully 🚀");
    closeModal();
    document.getElementById("bookingForm").reset();
  })
  .catch(err => {
    alert("Something went wrong!");
  });
});


// ================= MODAL =================

function openModal(trekName = "") {
  document.getElementById("bookingModal").style.display = "flex";
  if (trekName) {
    document.getElementById("destination").value = trekName;
  }
}

function closeModal(){
  document.getElementById("bookingModal").style.display = "none";
}

window.onclick = function(event) {
  const modal = document.getElementById("bookingModal");
  if (event.target == modal) {
    modal.style.display = "none";
  }
}

</script>
